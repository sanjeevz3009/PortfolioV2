[build]
  command = "pip install uv && uv sync && uv run pelican content -s publishconf.py"
  publish = "output"

[build.environment]
  PYTHON_VERSION = "3.14.2"

# Redirects
[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301
  force = true

# Security headers — applied to all responses
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME sniffing
    X-Content-Type-Options = "nosniff"
    # XSS protection (legacy browsers)
    X-XSS-Protection = "1; mode=block"
    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions policy — lock down browser APIs you don't use
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # HSTS — force HTTPS (31536000 = 1 year)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Content Security Policy
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;
      style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
      font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com;
      img-src 'self' data: https:;
      connect-src 'self';
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
    """

# Cache static assets aggressively
[[headers]]
  for = "/theme/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Cache HTML with short TTL (so updates propagate quickly)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
