services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 3s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      target: dev
    env_file:
      - .env
    environment:
      DATABASE_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  tailwind:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run tw:dev"
    volumes:
      - .:/app
    profiles: ["frontend"]

volumes:
  pgdata:
